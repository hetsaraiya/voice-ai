name: Deploy Web API (Azure)

on:
  push:
    branches: [main]
    paths:
      - "api/web-api/**"
      - "cmd/web/**"
      - "pkg/**"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

env:
  SERVICE: web-api
  BINARY: web-api.0.0.1
  ACR_NAME: rapidaacr

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup private module access
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
          eval "$(ssh-agent -s)"

      - name: Build binary
        run: |
          go mod download
          GOOS=linux GOARCH=amd64 go build -o $BINARY cmd/web/web.go

      - name: Login to ACR
        run: |
          az login --service-principal \
            -u "${{ secrets.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}" \
            -o none
          az acr login --name $ACR_NAME

      - name: Install oras
        run: |
          curl -fsSL https://github.com/oras-project/oras/releases/download/v1.2.2/oras_1.2.2_linux_amd64.tar.gz | tar xz -C /usr/local/bin oras

      - name: Push artifact to ACR
        run: |
          SHA=$(git rev-parse --short HEAD)
          oras push $ACR_NAME.azurecr.io/$SERVICE:latest,$SHA ./$BINARY
          echo "Pushed $ACR_NAME.azurecr.io/$SERVICE:latest and :$SHA"
